github_repo: "https://github.com/wiz-abhi/TruRank"
sandbox_link: "https://trurank-indiaruns.streamlit.app/"

# Precompute (offline, one-time) builds the cache + downloads models; then the
# timed ranking step produces the CSV. A Dockerfile chains both in one command.
reproduce_command: >-
  python precompute.py --candidates data/raw/candidates.jsonl --out data/processed/candidates_cache.pkl
  && python rank.py --candidates data/raw/candidates.jsonl --cache data/processed/candidates_cache.pkl --out submission.csv

