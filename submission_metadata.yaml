# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A two-step pipeline optimised for CPU-only execution within the 5-minute limit.

  Step 1 — Precompute (offline): Parse 100K JSONL candidates, build evidence-first
  embedding text (career descriptions before self-declared skills), and encode via
  sentence-transformers (all-MiniLM-L6-v2). Cache to disk as candidates_cache.pkl.

  Step 2 — Rank (timed): Load cache. Retrieve with 8-way Reciprocal Rank Fusion —
  6 aspect-based semantic queries + a weighted-aggregate semantic ranking + a BM25
  lexical pass over career descriptions — to an 800-candidate shortlist. Score each
  across 15 weighted signals (sweep-optimised on silver labels):
    - Career evidence (retrieval/ranking/production keywords in role history)
    - Skill evidence (validated by duration, proficiency, endorsements, assessments)
    - Skill corroboration (skills only earn credit if career text backs them)
    - Semantic similarity, skill-name match, experience fit, domain alignment
    - Career stability (penalises sub-20-month title-chasing hops)
    - Product-vs-services fit (boosts SaaS/product, penalises services-only)
    - Location fit (Pune/Noida preference, relocation awareness)
    - Work-mode compatibility, culture fit, skill recency
    - External validation (GitHub, endorsements, recruiter demand)
    - Production recency (months since last shipping role)
  The top 200 are reranked by a cross-encoder (ms-marco-MiniLM-L-6-v2) reading each
  (JD, candidate) pair jointly. A bounded (0.50–1.15) behavioral multiplier uses 20
  Redrob signals (notice period, GitHub score, response rate, profile completeness,
  interview completion, offer-acceptance, search visibility, etc.). Hard penalties
  apply for services-only careers (90%) and unrelated titles (90%). Profile-trust
  scoring penalises expert skill claims with zero months of usage.

  Honeypot Detection: A severity-threshold detector isolates impossible timelines, future dates, overlapping full-time roles, inflated career durations, and semantic traps (e.g. claiming to work at Sarvam AI in 2018). Successfully caught 80+ synthetic honeypot candidates with a 0% false positive rate. Flagged candidates are excluded before the top 100 is selected.

  Explainability: Each candidate receives a profile-specific reasoning paragraph
  referencing their job title, company, matched skills, and behavioral traits.

